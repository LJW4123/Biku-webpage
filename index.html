<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiKU - Konkuk Bicycle Club</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="container">
        <nav>
            <div class="logo" onclick="app.navigate('home')">BiKU</div>
            <ul class="nav-links" id="nav-links">
                <li><a href="#" onclick="app.navigate('dashboard')">대시보드</a></li>
                <li><a href="#" onclick="app.navigate('activity')">활동</a></li>
                <li><a href="#" onclick="app.navigate('community')">커뮤니티</a></li>
                <li><a href="#" onclick="app.navigate('my-records')">내 기록</a></li>
                <li><a href="#" onclick="app.navigate('records')">기록인증</a></li>
                <li><a href="#" onclick="app.navigate('rankings')">순위</a></li>
                <li><a href="#" id="auth-link" onclick="app.navigate('login')">로그인</a></li>
            </ul>
        </nav>

        <main id="app-content">
            <!-- Dynamic Content -->
        </main>
    </div>

    <!-- Views Templates -->
    <template id="view-home">
        <section class="hero fade-in" style="padding: 100px 0; text-align: center;">
            <h1 style="font-size: 4rem; font-weight: 800; margin-bottom: 1rem;">Keep Riding, <br><span
                    style="color: var(--secondary)">Dream BiKU</span></h1>
            <p style="color: var(--text-muted); font-size: 1.2rem; margin-bottom: 2rem;">건국대학교 중앙 자전거 동아리 BiKU에 오신 것을
                환영합니다.</p>
            <button class="btn btn-primary" onclick="app.navigate('signup')">지금 시작하기</button>
        </section>
    </template>

    <template id="view-login">
        <section id="auth-view" class="glass fade-in">
            <div class="auth-form">
                <h2>환영합니다!</h2>
                <div class="form-group">
                    <input type="text" id="login-username" placeholder="사용자 이름">
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" placeholder="비밀번호">
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="app.login()">로그인</button>
                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                    계정이 없으신가요? <a href="#" onclick="app.navigate('signup')"
                        style="color: var(--secondary); text-decoration: none;">회원가입</a>
                </p>
            </div>
        </section>
    </template>

    <template id="view-signup">
        <section id="auth-view" class="glass fade-in">
            <div class="auth-form">
                <h2>회원가입</h2>
                <div class="form-group">
                    <input type="text" id="signup-username" placeholder="사용자 이름">
                </div>
                <div class="form-group">
                    <input type="password" id="signup-password" placeholder="비밀번호">
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="app.signup()">가입하기</button>
                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                    이미 계정이 있나요? <a href="#" onclick="app.navigate('login')"
                        style="color: var(--secondary); text-decoration: none;">로그인</a>
                </p>
            </div>
        </section>
    </template>

    <template id="view-records">
        <section class="fade-in" style="padding: 50px 0;">
            <div class="glass card" style="max-width: 600px; margin: 0 auto; position: relative; overflow: hidden;">
                <h2>라이딩 기록 인증</h2>
                <p style="color: var(--text-muted); margin-bottom: 1.5rem;">스트라바 등 라이딩 앱의 결과 화면을 업로드하세요.</p>

                <div id="upload-area"
                    style="border: 2px dashed var(--glass-border); padding: 2rem; text-align: center; border-radius: 15px; margin-bottom: 2rem; cursor: pointer;"
                    onclick="document.getElementById('ride-image').click()">
                    <div id="preview-container" style="display: none; margin-bottom: 1rem;">
                        <div id="thumbnail-list"
                            style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                            <!-- Thumbnails will be injected here -->
                        </div>
                    </div>
                    <div id="upload-placeholder">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">📸</div>
                        <p>이미지를 클릭하여 업로드 (여러 장 가능)</p>
                    </div>
                    <input type="file" id="ride-image" accept="image/*" multiple style="display: none;"
                        onchange="app.handleImageUpload(event)">
                </div>

                <div id="strava-sync-section" style="margin-bottom: 2rem;">
                    <button class="btn" style="width: 100%; background: #fc4c02; color: white;"
                        onclick="app.connectStrava()">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Strava_Logo.svg"
                            style="height: 20px; vertical-align: middle; margin-right: 10px; filter: brightness(0) invert(1);">
                        Strava에서 활동 불러오기
                    </button>
                </div>

                <div id="strava-activity-list"
                    style="display: none; margin-bottom: 2rem; max-height: 300px; overflow-y: auto;" class="glass">
                    <!-- Activities will be listed here -->
                </div>

                <div id="map-preview"
                    style="height: 250px; border-radius: 12px; margin-bottom: 1.5rem; display: none; border: 1px solid var(--glass-border);">
                </div>

                <div id="extraction-status" style="display: none; text-align: center; margin-bottom: 2rem;">
                    <div class="loader" style="margin: 0 auto 1rem;"></div>
                    <p>이미지 분석 중...</p>
                </div>

                <div id="record-form" style="display: none; margin-top: 2rem;">
                    <p
                        style="color: var(--secondary); font-weight: 700; margin-bottom: 0.5rem; text-align: center; font-size: 0.9rem;">
                        ⚠️ 기록이 정확하게 추출되었는지 꼭 확인해 주세요!</p>
                    <p style="color: var(--text-muted); margin-bottom: 1.5rem; text-align: center; font-size: 0.8rem;">
                        (사진 데이터는 관리자 승인 후 최종 등록됩니다)</p>

                    <div class="form-group">
                        <label>라이딩 일시</label>
                        <input type="datetime-local" id="ride-date">
                    </div>
                    <div class="form-group">
                        <label>라이딩 거리 (km)</label>
                        <input type="number" id="ride-distance" placeholder="예: 25.5" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>획득 고도 (m)</label>
                        <input type="number" id="ride-elevation" placeholder="예: 350">
                    </div>
                    <div class="form-group">
                        <label>주행 시간 (분)</label>
                        <input type="number" id="ride-time" placeholder="예: 120">
                    </div>
                    <div class="form-group">
                        <label>평균 속도 (km/h)</label>
                        <input type="number" id="ride-avg-speed" placeholder="예: 22.5" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>최고 속도 (km/h)</label>
                        <input type="number" id="ride-max-speed" placeholder="예: 45.0" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>라이딩 소감 (키워드 업적 달성용!)</label>
                        <input type="text" id="ride-comment" placeholder="예: 비오는 날 카페 다녀옴!">
                    </div>

                    <div class="toggle-group">
                        <span style="font-weight: 600; font-size: 0.95rem;">🚲 따릉이(공공자전거) 인증</span>
                        <label class="switch">
                            <input type="checkbox" id="is-ttareungyi">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button class="btn btn-primary" style="flex: 1;" onclick="app.submitRecord()">기록 확정 및
                            저장</button>
                        <button class="btn btn-secondary"
                            style="flex: 1; border-color: rgba(255,0,0,0.3); color: #ff4444;"
                            onclick="app.resetUpload()">다시 업로드</button>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="view-activity">
        <section class="fade-in" style="padding: 50px 0;">
            <h1>최근 활동</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">BiKU 멤버들의 멋진 라이딩 기록입니다.</p>
            <div id="activity-feed-list" class="dashboard-grid">
                <!-- Records from all users -->
            </div>
        </section>
    </template>

    <template id="view-community">
        <section class="fade-in" style="padding: 50px 0;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>커뮤니티</h1>
                <button class="btn btn-primary" onclick="app.openPostModal()">글쓰기</button>
            </div>
            <div id="community-post-list" style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Posts will be listed here -->
            </div>
        </section>
    </template>

    <template id="view-post-detail">
        <section class="fade-in" style="padding: 50px 0;">
            <button class="btn btn-secondary" style="margin-bottom: 2rem;" onclick="app.navigate('community')">←
                목록으로</button>
            <div class="glass card" id="post-detail-container" style="padding: 2.5rem; margin-bottom: 2rem;">
                <!-- Post content -->
            </div>
            <div class="glass card" style="padding: 2rem;">
                <h3>댓글</h3>
                <div id="comments-list" style="margin: 1.5rem 0; display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Comments -->
                </div>
                <div class="form-group" style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                    <input type="text" id="comment-input" placeholder="댓글을 입력하세요..." style="flex: 1;"
                        onkeypress="if(event.key === 'Enter') app.submitComment()">
                    <button class="btn btn-primary" onclick="app.submitComment()">등록</button>
                </div>
            </div>
        </section>
    </template>

    <template id="view-my-records">
        <section class="fade-in" style="padding: 50px 0;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>내 라이딩 기록</h1>
                <button class="btn btn-primary" onclick="app.navigate('records')">새 기록 인증</button>
            </div>
            <div id="my-records-list" class="dashboard-grid">
                <!-- Records will be injected here as cards -->
            </div>
        </section>
    </template>

    <template id="view-dashboard">
        <section class="fade-in" style="padding: 50px 0;">
            <h1>내 대시보드</h1>
            <div class="dashboard-grid">
                <div class="glass card">
                    <h3>총 활동 요약</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="stats-total-dist">0</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">총 거리 (km)</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="stats-total-elev">0</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">총 고도 (m)</div>
                        </div>
                    </div>
                </div>
                <div class="glass card">
                    <h3>최근 기록</h3>
                    <div id="recent-records-list" style="margin-top: 1rem;">
                        <p style="color: var(--text-muted);">기록이 없습니다.</p>
                    </div>
                </div>
                <div class="glass card" onclick="app.navigate('achievements')" style="cursor: pointer;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3>내 업적</h3>
                        <span style="font-size: 0.8rem; color: var(--secondary);">모두 보기 →</span>
                    </div>
                    <div id="dashboard-achievements-summary" style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <p style="color: var(--text-muted); font-size: 0.9rem;">활동을 시작하고 업적을 달성해보세요!</p>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="view-rankings">
        <section class="fade-in" style="padding: 50px 0;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>시즌 순위</h1>
                <div style="font-size: 0.9rem; color: var(--text-muted);">실시간 승인된 기록 기준</div>
            </div>
            <div class="glass card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>순위</th>
                                <th>이름</th>
                                <th>거리 (km)</th>
                                <th>획득고도 (m)</th>
                                <th>활동수</th>
                            </tr>
                        </thead>
                        <tbody id="ranking-tbody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </template>

    <template id="view-achievements">
        <section class="fade-in" style="padding: 50px 0;">
            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                <button class="btn btn-secondary" onclick="app.navigate('dashboard')"
                    style="padding: 0.5rem 1rem;">←</button>
                <h1>내 업적</h1>
            </div>
            <div id="achievements-grid" class="dashboard-grid"
                style="grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));">
                <!-- Achievements will be injected here -->
            </div>
        </section>
    </template>

    <template id="view-admin">
        <section class="fade-in" style="padding: 50px 0;">
            <h1>관리자 대시보드</h1>
            <div class="dashboard-grid">
                <div class="glass card">
                    <h3>회원 관리</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>아이디</th>
                                <th>명령</th>
                            </tr>
                        </thead>
                        <tbody id="admin-user-table-body"></tbody>
                    </table>
                </div>
                <div class="glass card">
                    <h3>전체 기록 관리</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>회원</th>
                                <th>기록</th>
                                <th>날짜</th>
                                <th>명령</th>
                            </tr>
                        </thead>
                        <tbody id="admin-record-table-body"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </template>

    <div id="post-modal" class="modal-overlay" style="display: none;">
        <div class="glass modal-content" style="max-width: 600px;">
            <h3>새 게시글 작성</h3>
            <div class="form-group" style="margin-top: 1.5rem;">
                <label>제목</label>
                <input type="text" id="post-title" placeholder="제목을 입력하세요">
            </div>
            <div class="form-group">
                <label>내용</label>
                <textarea id="post-content" rows="8"
                    style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: white; padding: 1rem; font-family: inherit; resize: none;"
                    placeholder="내용을 입력하세요"></textarea>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button class="btn btn-primary" style="flex: 1;" onclick="app.submitPost()">등록</button>
                <button class="btn btn-secondary" style="flex: 1;" onclick="app.closePostModal()">취소</button>
            </div>
        </div>
    </div>

    <div id="record-detail-modal" class="modal-overlay" style="display: none;">
        <div class="glass modal-content"
            style="max-width: 600px; width: 95%; max-height: 90vh; overflow-y: auto; padding: 0;">
            <div id="detail-map" style="height: 300px; width: 100%; display: none;"></div>
            <img id="detail-image" style="width: 100%; display: none;" src="">
            <div style="padding: 2rem;">
                <h3 id="detail-title" style="margin-bottom: 1rem;">라이딩 상세</h3>
                <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr); gap: 0.5rem;">
                    <div class="stat-item">
                        <div id="detail-dist" class="stat-value" style="font-size: 1.2rem;">0</div>
                        <div style="font-size: 0.7rem;">거리(km)</div>
                    </div>
                    <div class="stat-item">
                        <div id="detail-elev" class="stat-value" style="font-size: 1.2rem;">0</div>
                        <div style="font-size: 0.7rem;">고도(m)</div>
                    </div>
                    <div class="stat-item">
                        <div id="detail-time" class="stat-value" style="font-size: 1.2rem;">0</div>
                        <div style="font-size: 0.7rem;">시간</div>
                    </div>
                    <div class="stat-item">
                        <div id="detail-avg-speed" class="stat-value" style="font-size: 1.2rem;">0</div>
                        <div style="font-size: 0.7rem;">평속(km/h)</div>
                    </div>
                    <div class="stat-item">
                        <div id="detail-max-speed" class="stat-value" style="font-size: 1.2rem;">0</div>
                        <div style="font-size: 0.7rem;">최고속(km/h)</div>
                    </div>
                    <div class="stat-item">
                        <div id="detail-status" class="stat-value" style="font-size: 1rem;">-</div>
                        <div style="font-size: 0.7rem;">상태</div>
                    </div>
                </div>
                <div style="margin-top: 1.5rem; text-align: right;">
                    <button class="btn btn-secondary" onclick="app.closeDetailModal()">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay" style="display: none;">
        <div class="glass modal-content">
            <h3>기록 수정</h3>
            <input type="hidden" id="edit-record-id">
            <div class="form-group">
                <label>라이딩 거리 (km)</label>
                <input type="number" id="edit-ride-distance" step="0.01">
            </div>
            <div class="form-group">
                <label>획득 고도 (m)</label>
                <input type="number" id="edit-ride-elevation">
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button class="btn btn-primary" style="flex: 1;" onclick="app.saveEdit()">저장</button>
                <button class="btn btn-secondary" style="flex: 1;" onclick="app.closeEditModal()">취소</button>
            </div>
        </div>
    </div>

    <div id="achievement-modal" class="modal-overlay" style="display: none;">
        <div class="glass modal-content" style="max-width: 400px; text-align: center; padding: 2.5rem;">
            <div id="ach-modal-icon" style="font-size: 4rem; margin-bottom: 1.5rem;">🏆</div>
            <h2 id="ach-modal-title" style="margin-bottom: 1rem;">업적 이름</h2>
            <p id="ach-modal-desc" style="color: var(--text-main); margin-bottom: 1.5rem; line-height: 1.6;">업적 설명이 이곳에
                들어갑니다.</p>
            <div id="ach-modal-requirement"
                style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; font-size: 0.9rem; color: var(--secondary); margin-bottom: 2rem; border: 1px solid var(--glass-border);">
                달성 조건: 거리 100km
            </div>
            <button class="btn btn-primary" style="width: 100%;"
                onclick="document.getElementById('achievement-modal').style.display='none'">확인</button>
        </div>
    </div>

    <script src="app.js?v=1.1"></script>
</body>

</html>
